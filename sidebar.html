<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veil</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --bg-surface: #12121a;
      --bg-elevated: #1a1a26;
      --border: #2a2a3a;
      --text: #e0e0e8;
      --text-dim: #8888a0;
      --accent: #6c63ff;
      --accent-hover: #7b73ff;
      --danger: #ff4757;
      --success: #2ed573;
      --warning: #ffa502;
      --radius: 8px;
    }

    html[dir="rtl"] { direction: rtl; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 14px;
    }

    /* --- Header --- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
    }
    .header-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .lock-icon { font-size: 18px; }
    .header-status {
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 400;
      letter-spacing: 0;
    }
    .header-status.verified { color: var(--success); }
    .header-status.warning { color: var(--danger); }

    /* --- Panels --- */
    .panel {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }
    .panel.active {
      display: flex;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    /* --- Buttons --- */
    .btn {
      display: block;
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary {
      background: var(--bg-elevated);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--border); }
    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
    }
    .btn-danger:hover { background: rgba(255, 71, 87, 0.1); }
    .btn + .btn { margin-top: 8px; }
    .btn-small {
      padding: 8px 12px;
      font-size: 12px;
    }

    /* --- Inputs --- */
    .input-group {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    input[type="text"], textarea {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      resize: none;
    }
    input[type="text"]:focus, textarea:focus {
      border-color: var(--accent);
    }

    /* --- Messages --- */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.4;
      word-wrap: break-word;
    }
    .msg-you {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-them {
      align-self: flex-start;
      background: var(--bg-elevated);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .msg-system {
      align-self: center;
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      text-align: center;
      padding: 4px 8px;
    }

    /* --- Compose --- */
    .compose {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--bg-surface);
    }
    .compose-row {
      display: flex;
      gap: 8px;
    }
    .compose-row textarea {
      flex: 1;
      min-height: 40px;
      max-height: 100px;
    }
    .compose-row .btn {
      width: auto;
      flex-shrink: 0;
    }

    /* --- Session footer --- */
    .session-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    .session-footer .btn { flex: 1; }

    /* --- Code block for keys/fingerprints --- */
    .code-block {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      word-break: break-all;
      margin: 8px 0;
      color: var(--text-dim);
      user-select: all;
    }

    /* --- Section --- */
    .section {
      margin-top: 20px;
    }
    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 8px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
    }

    /* --- Info text --- */
    .info-text {
      color: var(--text-dim);
      font-size: 13px;
      line-height: 1.5;
      margin: 8px 0;
    }

    /* --- Language picker --- */
    .lang-picker {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 24px;
      padding: 40px;
    }
    .lang-picker h2 {
      font-size: 20px;
      font-weight: 700;
    }
    .lang-buttons {
      display: flex;
      gap: 12px;
    }
    .lang-btn {
      padding: 14px 32px;
      background: var(--bg-elevated);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .lang-btn:hover {
      border-color: var(--accent);
    }

    /* --- Fingerprint --- */
    .fingerprint-display {
      text-align: center;
      margin: 12px 0;
    }
    .fingerprint-value {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--success);
    }

    /* --- Warning banner --- */
    .warning-banner {
      background: rgba(255, 71, 87, 0.1);
      border: 1px solid var(--danger);
      border-radius: var(--radius);
      padding: 12px;
      margin: 8px 0;
      color: var(--danger);
      font-weight: 600;
      text-align: center;
    }

    /* --- Onboarding --- */
    .onboarding-prompt {
      background: var(--bg-elevated);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 16px;
      margin: 8px 0;
      text-align: center;
      color: var(--text);
      line-height: 1.5;
    }

    /* --- Step indicator --- */
    .step-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin: 8px 0 20px;
    }
    .step-badge {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--bg-elevated);
      border: 2px solid var(--border);
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .step-badge.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .step-badge.done {
      background: var(--success);
      border-color: var(--success);
      color: #fff;
    }
    .step-line {
      width: 40px;
      height: 2px;
      background: var(--border);
    }
    .step-line.done {
      background: var(--success);
    }
    .step-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    /* --- Status box --- */
    .status-box {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      text-align: center;
    }
    .status-box.waiting {
      background: rgba(255, 165, 2, 0.1);
      border: 1px solid var(--warning);
      color: var(--warning);
    }
    .status-box.success {
      background: rgba(46, 213, 115, 0.1);
      border: 1px solid var(--success);
      color: var(--success);
    }

    /* --- How it works --- */
    .how-it-works-text {
      white-space: pre-line;
    }

    /* --- Copy feedback --- */
    .copy-feedback {
      color: var(--success);
      font-size: 12px;
      margin-top: 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .copy-feedback.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">
      <span class="lock-icon">&#x1f512;</span>
      <span>VEIL</span>
      <span class="header-status" id="headerStatus"></span>
    </div>
  </div>

  <!-- Language Picker -->
  <div class="panel" id="panelLang">
    <div class="lang-picker">
      <h2 id="langTitle">Welcome to Veil</h2>
      <div class="lang-buttons">
        <button class="lang-btn" data-lang="en">English</button>
        <button class="lang-btn" data-lang="fa">&#x0641;&#x0627;&#x0631;&#x0633;&#x06CC;</button>
      </div>
    </div>
  </div>

  <!-- No Session Panel -->
  <div class="panel" id="panelNoSession">
    <div class="panel-body">
      <p class="info-text" data-i18n="no_session"></p>

      <div class="section">
        <div class="section-title" data-i18n="how_it_works"></div>
        <p class="info-text how-it-works-text" data-i18n="how_it_works_desc"></p>
      </div>

      <button class="btn btn-primary" id="btnStartSession" data-i18n="create_invite"></button>
      <button class="btn btn-secondary" id="btnCompleteHandshake" data-i18n="i_received_invite"></button>

      <div class="section">
        <div class="section-title" data-i18n="manual_tools"></div>
        <p class="info-text" data-i18n="paste_decrypt"></p>
        <div class="input-group">
          <input type="text" id="manualDecryptInput" placeholder="...">
          <button class="btn btn-secondary btn-small" id="btnManualDecrypt" data-i18n="decrypt"></button>
        </div>
        <p class="info-text" id="manualDecryptResult" style="margin-top: 8px;"></p>
      </div>

      <div class="section">
        <button class="btn btn-secondary btn-small" id="btnSettings" data-i18n="settings"></button>
      </div>
    </div>
  </div>

  <!-- Handshake: Initiator created invite, waiting for response -->
  <div class="panel" id="panelHandshake">
    <div class="panel-body">
      <div class="step-indicator">
        <div class="step-badge active">1</div>
        <div class="step-line done"></div>
        <div class="step-badge">2</div>
        <div class="step-line"></div>
        <div class="step-badge">3</div>
      </div>

      <h3 class="step-title" data-i18n="step1_title"></h3>
      <p class="info-text" data-i18n="step1_desc"></p>

      <p class="info-text" style="margin-top: 12px;" data-i18n="send_invite"></p>
      <div class="code-block" id="inviteCode"></div>
      <button class="btn btn-primary btn-small" id="btnCopyInvite" data-i18n="copy_invite"></button>
      <span class="copy-feedback" id="copyFeedback" data-i18n="copied"></span>

      <div class="status-box waiting" style="margin-top: 20px;">
        <span data-i18n="status_waiting"></span>
      </div>

      <p class="info-text" style="margin-top: 12px;" data-i18n="step2_desc"></p>

      <div class="section" style="margin-top: 16px;">
        <p class="info-text" data-i18n="or_paste_reply"></p>
        <textarea id="pasteReplyInput" rows="3" data-i18n-placeholder="paste_reply_here" style="margin-top: 8px;"></textarea>
        <button class="btn btn-secondary btn-small" id="btnSubmitReply" style="margin-top: 8px;" data-i18n="submit_reply"></button>
        <div id="replyError" class="warning-banner" style="display: none; margin-top: 8px;"></div>
      </div>

      <button class="btn btn-danger btn-small" id="btnCancelHandshake" style="margin-top: 16px;" data-i18n="cancel"></button>
    </div>
  </div>

  <!-- Handshake: User B pastes received invite -->
  <div class="panel" id="panelHandshakeReceived">
    <div class="panel-body">
      <div class="step-indicator">
        <div class="step-badge active">1</div>
        <div class="step-line"></div>
        <div class="step-badge">2</div>
        <div class="step-line"></div>
        <div class="step-badge">3</div>
      </div>

      <h3 class="step-title" data-i18n="paste_invite_prompt"></h3>
      <textarea id="pasteInviteInput" rows="4" data-i18n-placeholder="paste_here" style="margin-top: 12px;"></textarea>
      <button class="btn btn-primary" id="btnAcceptHandshake" style="margin-top: 8px;" data-i18n="connect"></button>
      <button class="btn btn-secondary btn-small" id="btnRejectHandshake" style="margin-top: 8px;" data-i18n="cancel"></button>

      <div id="handshakeError" class="warning-banner" style="display: none; margin-top: 12px;"></div>
    </div>
  </div>

  <!-- Active Session Panel -->
  <div class="panel" id="panelSession">
    <div class="messages" id="messagesList"></div>
    <div class="compose">
      <div class="compose-row">
        <textarea id="composeInput" rows="1" data-i18n-placeholder="type_message"></textarea>
        <button class="btn btn-primary btn-small" id="btnSend" data-i18n="send_encrypted"></button>
      </div>
    </div>
    <div class="compose" style="border-top: none; padding-top: 0;">
      <p class="info-text" style="font-size: 12px; margin-bottom: 4px;" data-i18n="paste_incoming"></p>
      <div class="compose-row">
        <textarea id="pasteIncomingInput" rows="1" data-i18n-placeholder="paste_incoming_here"></textarea>
        <button class="btn btn-secondary btn-small" id="btnDecryptIncoming" data-i18n="decrypt_incoming"></button>
      </div>
    </div>
    <div class="session-footer">
      <button class="btn btn-danger btn-small" id="btnEndSession" data-i18n="end_session"></button>
      <button class="btn btn-secondary btn-small" id="btnSessionSettings" data-i18n="settings"></button>
    </div>
  </div>

  <!-- Settings Panel -->
  <div class="panel" id="panelSettings">
    <div class="panel-body">
      <div class="section">
        <div class="section-title" data-i18n="language"></div>
        <div class="lang-buttons" style="justify-content: flex-start;">
          <button class="lang-btn" data-lang="en" style="padding: 8px 20px; font-size: 13px;">English</button>
          <button class="lang-btn" data-lang="fa" style="padding: 8px 20px; font-size: 13px;">&#x0641;&#x0627;&#x0631;&#x0633;&#x06CC;</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title" data-i18n="onboarding_reset"></div>
        <button class="btn btn-secondary btn-small" id="btnResetOnboarding" data-i18n="onboarding_reset"></button>
      </div>

      <div class="section" id="fingerprintSection" style="display: none;">
        <div class="section-title" data-i18n="fingerprint"></div>
        <p class="info-text" data-i18n="compare_fingerprint"></p>
        <div class="fingerprint-display">
          <div class="fingerprint-value" id="fingerprintValue"></div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Info</div>
        <p class="info-text" data-i18n="what_veil_does"></p>
        <p class="info-text" data-i18n="what_veil_cannot"></p>
        <p class="info-text" style="color: var(--warning);" data-i18n="hygiene_note"></p>
      </div>

      <button class="btn btn-secondary" id="btnBackFromSettings" style="margin-top: 16px;">&#x2190; Back</button>
    </div>
  </div>

  <!-- Copy Fallback Panel -->
  <div class="panel" id="panelCopyFallback">
    <div class="panel-body">
      <p class="info-text" data-i18n="copy_fallback"></p>
      <div class="code-block" id="fallbackText"></div>
      <button class="btn btn-primary btn-small" id="btnCopyFallback" data-i18n="copy"></button>
      <span class="copy-feedback" id="copyFallbackFeedback" data-i18n="copied"></span>
      <button class="btn btn-secondary" id="btnBackFromFallback" style="margin-top: 12px;">&#x2190; Back</button>
    </div>
  </div>

  <!-- Onboarding Panel -->
  <div class="panel" id="panelOnboarding">
    <div class="panel-body">
      <div class="onboarding-prompt" id="onboardingPrompt"></div>
      <button class="btn btn-secondary" id="btnSkipOnboarding" style="margin-top: 12px;" data-i18n="cancel"></button>
    </div>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
