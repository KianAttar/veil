<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Test Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Simulate Telegram/WhatsApp-style fixed layout that spans the full viewport */
    #app-shell {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      background: #1a1a2e;
      color: #eee;
      font-family: sans-serif;
    }
    #app-header {
      padding: 12px 20px;
      background: #16213e;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }
    #app-header h2 { color: #e94560; font-size: 18px; }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }
    .message {
      padding: 8px 12px;
      margin: 4px 0;
      background: #0f3460;
      border-radius: 6px;
      word-break: break-all;
    }
    .message .sender { font-weight: bold; color: #e94560; }
    #inputArea {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      background: #16213e;
      border-top: 1px solid #333;
      flex-shrink: 0;
    }
    #chatInput {
      flex: 1;
      padding: 10px;
      border: 1px solid #333;
      background: #0f3460;
      color: #eee;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }
    #sendBtn {
      padding: 10px 24px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="app-shell">
    <div id="app-header">
      <h2 id="chatTitle">Test Chat</h2>
    </div>
    <div id="messages"></div>
    <div id="inputArea">
      <input type="text" id="chatInput" placeholder="Type a message..." />
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    const userName = new URLSearchParams(location.search).get('user') || 'User';
    document.getElementById('chatTitle').textContent = `Chat - ${userName}`;

    const channel = new BroadcastChannel('veil-test-chat');

    function addMessage(sender, text) {
      const div = document.createElement('div');
      div.className = 'message';
      div.innerHTML = `<span class="sender">${sender}:</span> `;
      div.appendChild(document.createTextNode(text));
      document.getElementById('messages').appendChild(div);
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }

    channel.onmessage = (e) => {
      if (e.data.sender !== userName) {
        addMessage(e.data.sender, e.data.text);
      }
    };

    function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value;
      if (!text) return;
      addMessage(userName, text);
      channel.postMessage({ sender: userName, text });
      input.value = '';
    }

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('chatInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
