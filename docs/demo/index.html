<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>How Veil Works — Interactive Walkthrough</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#05050a;--surface:#0c0c14;--elevated:#13131e;--border:#1e1e30;
      --text:#d8d8e4;--dim:#6a6a80;--accent:#6c63ff;
      --bob:#4a9eff;--john:#ff6b6b;--green:#2ed573;--red:#ff4757;--amber:#ffa502;
    }
    body{
      font-family:'Plus Jakarta Sans',system-ui,sans-serif;
      background:var(--bg);color:var(--text);min-height:100vh;
      display:flex;flex-direction:column;align-items:center;
      -webkit-font-smoothing:antialiased;overflow-x:hidden;
    }

    /* Top bar */
    .topbar{
      width:100%;max-width:920px;padding:28px 20px 0;
      display:flex;align-items:center;justify-content:space-between;
    }
    .topbar h1{font-size:13px;font-weight:700;letter-spacing:3px;color:var(--dim);text-transform:uppercase;}
    .topbar a{color:var(--dim);font-size:12px;text-decoration:none;}
    .topbar a:hover{color:var(--accent);}

    /* Step title */
    .step-header{
      width:100%;max-width:920px;padding:20px 20px 0;text-align:center;
    }
    .step-title{
      font-size:26px;font-weight:800;margin-bottom:6px;
      transition:opacity .15s;
    }
    .step-sub{font-size:13px;color:var(--dim);letter-spacing:1px;}

    /* Panels container */
    .panels{
      display:flex;gap:16px;padding:20px;width:100%;max-width:920px;
      justify-content:center;
    }

    /* Individual panel */
    .panel{
      flex:1;max-width:440px;background:var(--surface);
      border:1px solid var(--border);border-radius:14px;
      overflow:hidden;display:flex;flex-direction:column;
      position:relative;transition:box-shadow .3s,border-color .3s;
    }
    .panel.highlight-bob{border-color:rgba(74,158,255,.35);box-shadow:0 0 30px rgba(74,158,255,.08);}
    .panel.highlight-john{border-color:rgba(255,107,107,.35);box-shadow:0 0 30px rgba(255,107,107,.08);}

    /* Panel header */
    .p-head{
      padding:10px 14px;display:flex;align-items:center;gap:10px;
      border-bottom:1px solid var(--border);background:var(--elevated);
    }
    .p-badge{
      font-size:11px;font-weight:700;padding:2px 10px;border-radius:10px;
      letter-spacing:.5px;
    }
    .p-badge.bob{background:rgba(74,158,255,.12);color:var(--bob);}
    .p-badge.john{background:rgba(255,107,107,.12);color:var(--john);}
    .p-head .spacer{flex:1;}
    .p-status{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--dim);}
    .sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
    .sdot.none{background:var(--dim);opacity:.4;}
    .sdot.waiting{background:var(--amber);}
    .sdot.connected{background:var(--green);}
    .sdot.expired{background:var(--red);}
    .sdot.server{background:var(--amber);}

    .veil-icon{
      width:28px;height:28px;border-radius:6px;
      background:var(--elevated);border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;
      margin-left:4px;
    }
    .veil-icon svg{width:18px;height:18px;}
    .veil-icon.glow{border-color:var(--accent);box-shadow:0 0 10px rgba(108,99,255,.3);}

    /* Fingerprint bar */
    .fp-bar{
      padding:5px 14px;background:rgba(108,99,255,.05);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:8px;font-size:11px;
    }
    .fp-bar .label{color:var(--dim);}
    .fp-bar .val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--accent);letter-spacing:2px;}

    /* Server banner */
    .srv-banner{
      padding:6px 14px;background:rgba(255,165,2,.06);
      border-bottom:1px solid rgba(255,165,2,.15);
      font-size:11px;color:var(--amber);text-align:center;
      font-family:'JetBrains Mono',monospace;letter-spacing:1px;
    }

    /* Chat area */
    .p-chat{
      flex:1;min-height:280px;max-height:320px;overflow-y:auto;padding:14px;
      display:flex;flex-direction:column;gap:8px;
      transition:opacity .15s;
    }

    /* Messages */
    .msg-row{display:flex;flex-direction:column;max-width:85%;}
    .msg-row.mine{align-self:flex-end;}
    .msg-row.theirs{align-self:flex-start;}
    .bubble{
      padding:8px 12px;border-radius:10px;font-size:13px;line-height:1.45;
    }
    .msg-row.mine .bubble{border-bottom-right-radius:3px;}
    .msg-row.theirs .bubble{border-bottom-left-radius:3px;}
    .bubble.bob-mine{background:var(--bob);color:#fff;}
    .bubble.john-mine{background:var(--john);color:#fff;}
    .bubble.theirs-bubble{background:var(--elevated);border:1px solid var(--border);color:var(--text);}
    .bubble.failed{background:var(--elevated);border:1px solid rgba(255,71,87,.25);color:var(--red);font-style:italic;font-size:12px;}

    .cipher-text{
      font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);
      word-break:break-all;margin-top:3px;padding:3px 6px;
      background:rgba(0,0,0,.25);border-radius:3px;opacity:.7;
    }

    .cipher-block{
      font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);
      word-break:break-all;padding:8px 10px;
      background:var(--elevated);border:1px solid var(--border);border-radius:6px;
    }

    .sys-msg{
      align-self:center;font-size:11px;color:var(--dim);
      padding:4px 12px;background:var(--elevated);
      border:1px solid var(--border);border-radius:14px;
      text-align:center;max-width:90%;
    }
    .sys-msg.success{border-color:rgba(46,213,115,.2);color:var(--green);}

    /* Panel input (decorative) */
    .p-input{
      padding:8px 14px;border-top:1px solid var(--border);
      display:flex;gap:8px;background:var(--elevated);
    }
    .p-input input{
      flex:1;padding:7px 10px;background:var(--surface);
      border:1px solid var(--border);border-radius:6px;
      color:var(--dim);font-size:12px;font-family:inherit;
    }
    .p-input button{
      padding:7px 12px;border:none;border-radius:6px;
      background:var(--accent);color:#fff;font-size:11px;
      font-weight:600;font-family:inherit;opacity:.5;
    }
    .p-input.active input{color:var(--text);border-color:var(--accent);opacity:1;}
    .p-input.active button{opacity:1;}

    /* Mini popup overlay */
    .mini-popup{
      position:absolute;top:44px;right:10px;width:200px;
      background:var(--bg);border:1px solid var(--border);border-radius:10px;
      padding:12px;box-shadow:0 6px 24px rgba(0,0,0,.5);z-index:10;
    }
    .mp-title{font-size:12px;font-weight:700;letter-spacing:2px;margin-bottom:6px;color:var(--text);}
    .mp-host{font-size:9px;color:var(--dim);margin-bottom:8px;}
    .mp-status{
      display:flex;align-items:center;gap:6px;font-size:11px;color:var(--dim);
      padding:6px 8px;background:var(--surface);border-radius:5px;
      border:1px solid var(--border);margin-bottom:8px;
    }
    .mp-fp{
      font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;
      color:var(--accent);text-align:center;padding:8px;
      background:var(--surface);border-radius:5px;border:1px solid var(--border);
      margin-bottom:3px;letter-spacing:2px;
    }
    .mp-fp-label{font-size:9px;color:var(--dim);text-align:center;margin-bottom:8px;}
    .mp-btn{
      display:block;width:100%;padding:7px;border:none;border-radius:5px;
      font-size:11px;font-weight:600;cursor:default;font-family:inherit;
    }
    .mp-btn.start{background:var(--accent);color:#fff;}
    .mp-btn.end{background:transparent;color:var(--red);border:1px solid var(--red);}

    /* Description area */
    .desc-area{
      width:100%;max-width:920px;padding:0 20px;text-align:center;
    }
    .desc-text{
      font-size:15px;color:var(--dim);line-height:1.65;
      max-width:640px;margin:0 auto;
      transition:opacity .15s;
    }
    .desc-text strong{color:var(--text);font-weight:600;}

    /* Navigation */
    .nav{
      width:100%;max-width:920px;padding:20px;
      display:flex;align-items:center;justify-content:center;gap:16px;
    }
    .nav-btn{
      padding:10px 24px;border:1px solid var(--border);border-radius:8px;
      background:var(--surface);color:var(--text);font-size:13px;
      font-weight:600;cursor:pointer;font-family:inherit;
      transition:all .15s;min-width:120px;
    }
    .nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
    .nav-btn:disabled{opacity:.25;cursor:not-allowed;}
    .dots{display:flex;gap:8px;align-items:center;}
    .dot{
      width:8px;height:8px;border-radius:50%;background:var(--border);
      cursor:pointer;transition:all .2s;
    }
    .dot.active{background:var(--accent);transform:scale(1.3);}
    .dot:hover:not(.active){background:var(--dim);}

    /* CTA section (last step) */
    .cta-row{
      display:flex;gap:12px;justify-content:center;margin-top:16px;flex-wrap:wrap;
    }
    .cta-btn{
      padding:12px 28px;border:none;border-radius:8px;
      font-size:14px;font-weight:700;cursor:pointer;
      text-decoration:none;font-family:inherit;transition:all .15s;
    }
    .cta-primary{background:var(--accent);color:#fff;}
    .cta-primary:hover{background:#7b73ff;box-shadow:0 0 20px rgba(108,99,255,.2);}
    .cta-secondary{background:transparent;color:var(--accent);border:1px solid var(--accent);}
    .cta-secondary:hover{background:rgba(108,99,255,.08);}

    .hidden{display:none!important;}

    /* Responsive */
    @media(max-width:768px){
      .panels{flex-direction:column;align-items:center;}
      .panel{max-width:100%;width:100%;}
      .step-title{font-size:20px;}
      .desc-text{font-size:14px;}
      .nav-btn{padding:8px 16px;font-size:12px;min-width:90px;}
    }
  </style>
</head>
<body>

  <div class="topbar">
    <h1>How Veil Works</h1>
    <a href="/">&larr; veil.kiancode.dev</a>
  </div>

  <div class="step-header">
    <div class="step-title" id="stepTitle"></div>
    <div class="step-sub" id="stepSub"></div>
  </div>

  <!-- Side-by-side panels -->
  <div class="panels">
    <!-- Bob's panel -->
    <div class="panel" id="bobPanel">
      <div class="p-head">
        <span class="p-badge bob">Bob</span>
        <span class="spacer"></span>
        <div class="p-status"><div class="sdot none" id="bobDot"></div><span id="bobLabel">No encryption</span></div>
        <div class="veil-icon" id="bobIcon">
          <svg viewBox="0 0 128 128" fill="none"><path d="M64 22L98 38C98 38 100 72 88 88C78 101 64 108 64 108C64 108 50 101 40 88C28 72 30 38 30 38Z" fill="rgba(108,99,255,.1)" stroke="#6c63ff" stroke-width="4" stroke-linejoin="round"/><path d="M46 46L64 82L82 46" fill="none" stroke="#6c63ff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div class="fp-bar hidden" id="bobFp"><span class="label">Fingerprint:</span><span class="val" id="bobFpVal"></span></div>
      <div class="srv-banner hidden" id="bobSrv">PLATFORM SERVER STORAGE</div>
      <div class="p-chat" id="bobChat"></div>
      <div class="p-input" id="bobInput"><input placeholder="Type a message..." disabled><button disabled>Send</button></div>
      <div class="mini-popup hidden" id="bobPopup"></div>
    </div>

    <!-- John's panel -->
    <div class="panel" id="johnPanel">
      <div class="p-head">
        <span class="p-badge john">John</span>
        <span class="spacer"></span>
        <div class="p-status"><div class="sdot none" id="johnDot"></div><span id="johnLabel">No encryption</span></div>
        <div class="veil-icon" id="johnIcon">
          <svg viewBox="0 0 128 128" fill="none"><path d="M64 22L98 38C98 38 100 72 88 88C78 101 64 108 64 108C64 108 50 101 40 88C28 72 30 38 30 38Z" fill="rgba(108,99,255,.1)" stroke="#6c63ff" stroke-width="4" stroke-linejoin="round"/><path d="M46 46L64 82L82 46" fill="none" stroke="#6c63ff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div class="fp-bar hidden" id="johnFp"><span class="label">Fingerprint:</span><span class="val" id="johnFpVal"></span></div>
      <div class="srv-banner hidden" id="johnSrv">PLATFORM SERVER STORAGE</div>
      <div class="p-chat" id="johnChat"></div>
      <div class="p-input" id="johnInput"><input placeholder="Type a message..." disabled><button disabled>Send</button></div>
      <div class="mini-popup hidden" id="johnPopup"></div>
    </div>
  </div>

  <div class="desc-area">
    <p class="desc-text" id="descText"></p>
    <div class="hidden" id="ctaArea">
      <div class="cta-row">
        <a href="chat/" class="cta-btn cta-primary">Try the live chat playground</a>
        <a href="/" class="cta-btn cta-secondary">Learn more</a>
      </div>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn" id="prevBtn" disabled>&larr; Previous</button>
    <div class="dots" id="dots"></div>
    <button class="nav-btn" id="nextBtn">Next &rarr;</button>
  </div>

<script>
(function(){
  const $ = id => document.getElementById(id);

  const CIPHER_A = 'kR4n2XXVp1AhvJn.43se6DZpLKg/7KDzvghrv+f8Bx9qE2mP3nV0w==';
  const CIPHER_B = 'B0yCk8dgDaaT1S0V.vdy0U642bBG/Nj1ZbX0Ff+tNK+pUw28Ay8V3z==';
  const CIPHER_C = 'wQ7mHx3pRtYvN2Kj.8fLs4WdCe0AhBn6Xo/ZiU9gJk1MrPqTx5Yw7==';

  const STEPS = [
    {
      title: 'The Problem',
      sub: 'Step 1 of 7',
      desc: 'Bob and John chat on a regular messaging platform. Every message passes through the platform\'s server as <strong>plain text</strong> — the company, hackers, or anyone with server access can read everything.',
      highlight: null,
      bob: { dot:'none', label:'No encryption',
        msgs:[
          {from:'bob',text:'Hey, can you send me the API credentials?'},
          {from:'john',text:'Sure, the key is sk-9f8x2a7b3c...'},
          {from:'bob',text:'Got it. Delete this chat after.'},
        ], input:true },
      john: { dot:'none', label:'No encryption',
        msgs:[
          {from:'bob',text:'Hey, can you send me the API credentials?'},
          {from:'john',text:'Sure, the key is sk-9f8x2a7b3c...'},
          {from:'bob',text:'Got it. Delete this chat after.'},
        ], input:true },
    },
    {
      title: 'Bob Starts Veil',
      sub: 'Step 2 of 7',
      desc: 'Bob clicks the Veil extension icon and starts an encrypted session. His browser generates an <strong>ECDH P-256 key pair</strong>. The private key never leaves his device — only the public key is shared.',
      highlight: 'bob',
      bob: { dot:'waiting', label:'Waiting for John...', iconGlow:true,
        popup: { status:'waiting', statusText:'Waiting for peer...', btn:'start' },
        msgs:[
          {sys:true, text:'Generating ECDH P-256 key pair...'},
          {sys:true, text:'Public key sent to channel', ok:true},
        ]},
      john: { dot:'none', label:'No encryption',
        msgs:[
          {sys:true, text:'Waiting for Bob\'s invitation...'},
        ]},
    },
    {
      title: 'Key Exchange',
      sub: 'Step 3 of 7',
      desc: 'John opens Veil and starts his session. Both browsers perform <strong>Diffie-Hellman key agreement</strong> — they derive the same shared secret without ever transmitting it. The matching fingerprint confirms the connection is genuine.',
      highlight: 'john',
      bob: { dot:'connected', label:'Encrypted', fp:'A3F2 9B1C', iconGlow:true,
        popup: { status:'connected', statusText:'Encrypted session', fp:'A3F2 9B1C', btn:'end' },
        msgs:[
          {sys:true, text:'Public key sent', ok:true},
          {sys:true, text:'John\'s public key received', ok:true},
          {sys:true, text:'Shared secret derived (ECDH)'},
          {sys:true, text:'AES-256-GCM session ready', ok:true},
        ]},
      john: { dot:'connected', label:'Encrypted', fp:'A3F2 9B1C', iconGlow:true,
        popup: { status:'connected', statusText:'Encrypted session', fp:'A3F2 9B1C', btn:'end' },
        msgs:[
          {sys:true, text:'Public key sent', ok:true},
          {sys:true, text:'Bob\'s public key received', ok:true},
          {sys:true, text:'Shared secret derived (ECDH)'},
          {sys:true, text:'AES-256-GCM session ready', ok:true},
        ]},
    },
    {
      title: 'Encrypted Chat',
      sub: 'Step 4 of 7',
      desc: 'Messages are encrypted with <strong>AES-256-GCM</strong> before leaving the browser. The ciphertext below each message is what actually travels over the network and gets stored on the platform\'s server.',
      highlight: null,
      bob: { dot:'connected', label:'Encrypted', fp:'A3F2 9B1C', input:true,
        msgs:[
          {from:'bob',text:'The launch code is 7291-ALPHA', cipher:CIPHER_A},
          {from:'john',text:'Got it. Deploying at midnight.', cipher:CIPHER_B},
          {from:'bob',text:'Delete this conversation after.', cipher:CIPHER_C},
        ]},
      john: { dot:'connected', label:'Encrypted', fp:'A3F2 9B1C', input:true,
        msgs:[
          {from:'bob',text:'The launch code is 7291-ALPHA', cipher:CIPHER_A},
          {from:'john',text:'Got it. Deploying at midnight.', cipher:CIPHER_B},
          {from:'bob',text:'Delete this conversation after.', cipher:CIPHER_C},
        ]},
    },
    {
      title: 'What the Server Sees',
      sub: 'Step 5 of 7',
      desc: 'This is what the messaging platform stores on its servers. Even if <strong>breached, subpoenaed, or sold</strong> — your conversations are mathematically unreadable without the session key.',
      highlight: null, serverView: true,
      bob: { dot:'server', label:'Server view', srv:true,
        msgs:[
          {cipher:CIPHER_A+'nV0wYtRz5Ks8dH6jLpCqF2xM'},
          {cipher:CIPHER_B+'IYugsc7xMn4eR9pA0bKwH3vQ'},
          {cipher:CIPHER_C+'eR2Hs9bN0vFaQy6TgUm8wJnX'},
        ]},
      john: { dot:'server', label:'Server view', srv:true,
        msgs:[
          {cipher:CIPHER_A+'nV0wYtRz5Ks8dH6jLpCqF2xM'},
          {cipher:CIPHER_B+'IYugsc7xMn4eR9pA0bKwH3vQ'},
          {cipher:CIPHER_C+'eR2Hs9bN0vFaQy6TgUm8wJnX'},
        ]},
    },
    {
      title: 'Keys Are Gone',
      sub: 'Step 6 of 7',
      desc: 'When a session ends or the page is refreshed, encryption keys are <strong>erased from memory</strong>. Old messages become permanently unreadable — even to the people who sent them. This is forward secrecy.',
      highlight: null,
      bob: { dot:'expired', label:'Session expired',
        msgs:[
          {failed:true, cipher:CIPHER_A},
          {failed:true, cipher:CIPHER_B},
          {failed:true, cipher:CIPHER_C},
        ]},
      john: { dot:'expired', label:'Session expired',
        msgs:[
          {failed:true, cipher:CIPHER_A},
          {failed:true, cipher:CIPHER_B},
          {failed:true, cipher:CIPHER_C},
        ]},
    },
    {
      title: 'That\'s Veil',
      sub: 'Step 7 of 7',
      desc: 'End-to-end encryption that works on <strong>any messaging platform</strong>. No accounts, no servers, no trust required. Install the extension and chat privately — or try the live playground below.',
      highlight: null, cta: true,
      bob: { dot:'connected', label:'Protected', fp:'A3F2 9B1C', input:true,
        msgs:[
          {from:'bob',text:'No one can read this except us.', cipher:'Tm8gb25lIGNhbiByZWFkIHRoaXMgZXhjZXB0IHVz...'},
          {from:'john',text:'On any platform. Any chat.', cipher:'RW5kLXRvLWVuZCBlbmNyeXB0aW9uIGZvciBldmVy...'},
        ]},
      john: { dot:'connected', label:'Protected', fp:'A3F2 9B1C', input:true,
        msgs:[
          {from:'bob',text:'No one can read this except us.', cipher:'Tm8gb25lIGNhbiByZWFkIHRoaXMgZXhjZXB0IHVz...'},
          {from:'john',text:'On any platform. Any chat.', cipher:'RW5kLXRvLWVuZCBlbmNyeXB0aW9uIGZvciBldmVy...'},
        ]},
    },
  ];

  let current = 0;

  // Build dots
  const dotsEl = $('dots');
  STEPS.forEach((_,i) => {
    const d = document.createElement('span');
    d.className = 'dot' + (i===0?' active':'');
    d.addEventListener('click', () => goTo(i));
    dotsEl.appendChild(d);
  });

  function renderPanel(owner, data) {
    const panel = $(owner+'Panel');
    const dot = $(owner+'Dot');
    const label = $(owner+'Label');
    const icon = $(owner+'Icon');
    const fpBar = $(owner+'Fp');
    const fpVal = $(owner+'FpVal');
    const srvBanner = $(owner+'Srv');
    const chat = $(owner+'Chat');
    const inputArea = $(owner+'Input');
    const popup = $(owner+'Popup');

    // Status
    dot.className = 'sdot '+(data.dot||'none');
    label.textContent = data.label||'No encryption';

    // Icon glow
    icon.classList.toggle('glow', !!data.iconGlow);

    // Fingerprint
    if(data.fp){ fpBar.classList.remove('hidden'); fpVal.textContent=data.fp; }
    else fpBar.classList.add('hidden');

    // Server banner
    if(data.srv) srvBanner.classList.remove('hidden');
    else srvBanner.classList.add('hidden');

    // Input
    inputArea.classList.toggle('active', !!data.input);

    // Popup
    if(data.popup){
      const p = data.popup;
      popup.classList.remove('hidden');
      let html = '<div class="mp-title">VEIL</div><div class="mp-host">messenger.example.com</div>';
      html += '<div class="mp-status"><div class="sdot '+p.status+'"></div>'+p.statusText+'</div>';
      if(p.fp){
        html += '<div class="mp-fp">'+p.fp+'</div>';
        html += '<div class="mp-fp-label">Compare with your peer</div>';
      }
      if(p.btn==='start') html += '<div class="mp-btn start">Start Session</div>';
      if(p.btn==='end') html += '<div class="mp-btn end">End Session</div>';
      popup.innerHTML = html;
    } else {
      popup.classList.add('hidden');
    }

    // Panel highlight
    panel.classList.remove('highlight-bob','highlight-john');

    // Messages
    chat.innerHTML = '';
    for(const m of (data.msgs||[])){
      if(m.sys){
        const el = document.createElement('div');
        el.className = 'sys-msg'+(m.ok?' success':'');
        el.textContent = m.text;
        chat.appendChild(el);
      } else if(m.failed){
        const row = document.createElement('div');
        row.className = 'msg-row';
        const b = document.createElement('div');
        b.className = 'bubble failed';
        b.textContent = 'Cannot decrypt (no session key)';
        row.appendChild(b);
        if(m.cipher){
          const c = document.createElement('div');
          c.className = 'cipher-text';
          c.textContent = m.cipher;
          row.appendChild(c);
        }
        chat.appendChild(row);
      } else if(m.cipher && !m.text){
        // Server view: cipher only
        const el = document.createElement('div');
        el.className = 'cipher-block';
        el.textContent = m.cipher;
        chat.appendChild(el);
      } else if(m.from){
        const isMine = m.from === owner;
        const row = document.createElement('div');
        row.className = 'msg-row '+(isMine?'mine':'theirs');
        const b = document.createElement('div');
        if(isMine) b.className = 'bubble '+m.from+'-mine';
        else b.className = 'bubble theirs-bubble';
        b.textContent = m.text;
        row.appendChild(b);
        if(m.cipher){
          const c = document.createElement('div');
          c.className = 'cipher-text';
          c.textContent = m.cipher;
          row.appendChild(c);
        }
        chat.appendChild(row);
      }
    }
    chat.scrollTop = chat.scrollHeight;
  }

  function render(){
    const step = STEPS[current];

    // Title
    $('stepTitle').textContent = step.title;
    $('stepSub').textContent = step.sub;

    // Panels
    renderPanel('bob', step.bob);
    renderPanel('john', step.john);

    // Highlights
    if(step.highlight==='bob') $('bobPanel').classList.add('highlight-bob');
    if(step.highlight==='john') $('johnPanel').classList.add('highlight-john');

    // Description
    $('descText').innerHTML = step.desc;

    // CTA
    if(step.cta) $('ctaArea').classList.remove('hidden');
    else $('ctaArea').classList.add('hidden');

    // Dots
    dotsEl.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i===current));

    // Nav buttons
    $('prevBtn').disabled = current===0;
    $('nextBtn').disabled = current===STEPS.length-1;
  }

  function goTo(n){
    if(n<0||n>=STEPS.length||n===current) return;
    // Brief fade
    const chats = document.querySelectorAll('.p-chat');
    const desc = $('descText');
    chats.forEach(c=>c.style.opacity='0');
    desc.style.opacity='0';
    setTimeout(()=>{
      current = n;
      render();
      chats.forEach(c=>c.style.opacity='1');
      desc.style.opacity='1';
    },150);
  }

  // Event listeners
  $('prevBtn').addEventListener('click', ()=>goTo(current-1));
  $('nextBtn').addEventListener('click', ()=>goTo(current+1));
  document.addEventListener('keydown', e=>{
    if(e.key==='ArrowLeft') goTo(current-1);
    if(e.key==='ArrowRight') goTo(current+1);
  });

  // Init
  render();
})();
</script>

</body>
</html>
